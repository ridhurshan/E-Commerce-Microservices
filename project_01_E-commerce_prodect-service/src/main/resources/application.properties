spring.application.name=PRODUCT-SERVICE

# Use a dot (.) instead of underscore for server.port
server.port=8081

# MySQL configuration
# 1. Removed extra colon after jdbc
# 2. Used 127.0.0.1 to avoid Linux socket issues
# 3. Added SSL and Public Key settings for MySQL 8.4 compatibility
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/microservice_p1_prodect?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=Ridhu#330mysql

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=update

# Eureka configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

